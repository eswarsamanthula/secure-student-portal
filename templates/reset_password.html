{% extends "base.html" %}
{% block title %}Reset Password — Secure Student Portal{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div class="auth-card">
      <div style="font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;color:var(--safe);margin-bottom:0.25rem;letter-spacing:0.1em;">// Identity Verified</div>
      <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:0.25rem;">Set New Password</h2>
      <p class="xs muted" style="margin-bottom:1.25rem;">Choose a strong new password for your account.</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label>New Password</label>
          <div class="pw-wrap"><div class="eye-wrap"><input type="password" name="new_password" id="pw" placeholder="Min 8 · A-Z · 0-9 · symbol" required oninput="updateStrength(this.value)"><button type="button" class="eye-btn" onclick="toggleEye('pw','eyeIco1')" tabindex="-1"><span id="eyeIco1">👁</span></button></div>
        <button type="button" class="eye-btn" onclick="toggleEye(this)" tabindex="-1" aria-label="Toggle password visibility">
          <span class="eye-open"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="eye-close" style="display:none;"><svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
        </button>
      </div>
          <div class="strength-grid" style="margin-top:0.4rem;">
            <div class="s-bar" id="b0"></div><div class="s-bar" id="b1"></div>
            <div class="s-bar" id="b2"></div><div class="s-bar" id="b3"></div><div class="s-bar" id="b4"></div>
          </div>
          <div class="mono xs muted" id="sLabel" style="margin-top:3px;">Password strength</div>
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <div class="pw-wrap"><div class="eye-wrap"><input id="pwField2" type="password" name="confirm_password" placeholder="Re-enter new password" required><button type="button" class="eye-btn" onclick="toggleEye('pwField2','eyeIco2')" tabindex="-1"><span id="eyeIco2">👁</span></button></div>
        <button type="button" class="eye-btn" onclick="toggleEye(this)" tabindex="-1" aria-label="Toggle password visibility">
          <span class="eye-open"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="eye-close" style="display:none;"><svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
        </button>
      </div>
        </div>
        <button type="submit" class="btn btn-terminal btn-full" style="margin-top:0.5rem;">🔒 Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
function updateStrength(pw) {
  let s = [pw.length>=8,/[A-Z]/.test(pw),/[a-z]/.test(pw),/\d/.test(pw),/[!@#$%^&*(),.?":{}|<>]/.test(pw)].filter(Boolean).length;
  for (let i=0;i<5;i++) document.getElementById('b'+i).className='s-bar'+(i<s?' on':'');
  document.getElementById('sLabel').textContent = s>0?labels[s-1]+' ('+s+'/5)':'Password strength';
}
</script>
{% endblock %}
